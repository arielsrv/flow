name: 🟢 CI — Node

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow — llamado desde pipeline.yml cuando language = "node"
#
# Requiere en el repo consumidor:
#   • package.json
#   • .nvmrc  (versión de Node, opcional — si no existe usa LTS)
#
# Pasos:
#   1. Checkout del repo consumidor
#   2. Setup Node (versión leída del .nvmrc si existe)
#   3. npm ci
#   4. npm run build  (si existe el script)
#   5. npm test
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:

jobs:
  ci:
    name: 🔨 Build & Test — Node
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: 🔍 Context info
        run: |
          echo "──────────────────────────────────────────"
          echo "🟢 Node version : $(node --version)"
          echo "📦 npm version  : $(npm --version)"
          echo "👤 Actor        : ${{ github.actor }}"
          echo "🔑 Commit       : ${{ github.sha }}"
          echo "──────────────────────────────────────────"

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔨 Build
        run: npm run build --if-present

      - name: 🧪 Test
        run: npm test

      - name: 📋 CI Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"; [ "${STATUS}" != "success" ] && ICON="❌"
          echo "## ${ICON} CI — Node" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Install | \`npm ci\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | \`npm run build\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | \`npm test\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${{ github.sha }}\` · **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

