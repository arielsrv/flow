name: 🚀 CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS
#   • push a main            → CI (compile + test)
#   • PR contra main         → CI (compile + test)
#   • tag v*.*.*             → Build & Push simulado a ACR
#   • workflow_dispatch      → Deploy manual a entorno elegido
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "🏷️  Tag de imagen a desplegar (ej: v1.2.3)"
        required: true
        type: string
      environment:
        description: "🌍 Entorno de despliegue"
        required: true
        type: environment   # ← GitHub lista automáticamente los environments del repo

# ─────────────────────────────────────────────────────────────────────────────
# VARIABLES GLOBALES (ajustar según el proyecto)
# ─────────────────────────────────────────────────────────────────────────────
env:
  ACR_NAME: myregistry        # ← nombre de tu Azure Container Registry
  IMAGE_NAME: my-app          # ← nombre de la imagen Docker

# ─────────────────────────────────────────────────────────────────────────────
# JOBS
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 · CI — Compile + Test
  #   Corre en: push a main  |  PR contra main
  # ───────────────────────────────────────────────────────────────────────────
  ci:
    name: 🔨 Compile & Test
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔍 Info del contexto
        run: |
          echo "──────────────────────────────────────────"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "🔀 PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
            echo "   ${{ github.head_ref }} → ${{ github.base_ref }}"
          else
            echo "⬆️  Push directo a main"
            echo "   Commit: ${{ github.sha }}"
            echo "   Mensaje: ${{ github.event.head_commit.message }}"
          fi
          echo "   Actor: ${{ github.actor }}"
          echo "──────────────────────────────────────────"

      - name: 📦 Compilar
        run: |
          echo ""
          echo "🔨 Iniciando compilación..."
          echo "  → [1/3] Resolviendo dependencias ............. ✅"
          sleep 1
          echo "  → [2/3] Compilando código fuente ............. ✅"
          sleep 1
          echo "  → [3/3] Generando artefactos ................. ✅"
          echo ""
          echo "✅ Compilación exitosa en 2s"
          echo ""

      - name: 🧪 Ejecutar tests
        run: |
          echo ""
          echo "🧪 Ejecutando suite de tests..."
          echo ""
          echo "  Unit Tests:"
          echo "    ✅ AuthServiceTest          (5 tests  · 12ms)"
          echo "    ✅ UserRepositoryTest       (8 tests  · 34ms)"
          echo "    ✅ OrderControllerTest      (12 tests · 56ms)"
          echo "    ✅ PaymentProcessorTest     (7 tests  · 28ms)"
          echo "    ✅ NotificationServiceTest  (10 tests · 19ms)"
          echo ""
          echo "  Integration Tests:"
          echo "    ✅ DatabaseIntegrationTest  (3 tests  · 210ms)"
          echo "    ✅ ApiEndpointsTest         (5 tests  · 340ms)"
          echo ""
          echo "──────────────────────────────────────────"
          echo "  Tests:    42 passed  |  0 failed  |  0 skipped"
          echo "  Coverage: 87.4%"
          echo "  Duración: 699ms"
          echo "──────────────────────────────────────────"
          echo ""
          echo "✅ Todos los tests pasaron"

      - name: 📋 Resumen CI
        run: |
          echo "## ✅ CI Superado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Paso | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Compilación | ✅ Éxito |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests (42) | ✅ 42 passed / 0 failed |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Coverage | 87.4% |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${{ github.sha }}\` · **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 · Build & Push → ACR (simulado)
  #   Corre en: push de tag  v*.*.*
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push → ACR
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag:   ${{ steps.meta.outputs.tag }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔖 Extraer metadata del tag
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "📌 Tag detectado : ${TAG}"
          echo "🖼️  Imagen destino : ${IMAGE}:${TAG}"

      - name: 📦 Compilar para producción (simulado)
        run: |
          echo ""
          echo "🔨 Build de producción..."
          echo "  → [1/4] Resolviendo dependencias ............. ✅"
          sleep 1
          echo "  → [2/4] Compilando en modo RELEASE ........... ✅"
          sleep 1
          echo "  → [3/4] Ejecutando tests pre-empaquetado ..... ✅"
          sleep 1
          echo "  → [4/4] Generando artefacto final ............ ✅"
          echo ""
          echo "✅ Build de producción listo"

      - name: 🔐 Login en ACR (simulado)
        run: |
          echo ""
          echo "🔐 Autenticando en Azure Container Registry..."
          echo "  → az acr login --name ${{ env.ACR_NAME }}"
          echo ""
          echo "✅ Sesión iniciada en ${{ env.ACR_NAME }}.azurecr.io"

      - name: 🐳 Docker build (simulado)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          echo ""
          echo "🐳 Construyendo imagen Docker..."
          echo "  → docker build \\"
          echo "       --platform linux/amd64 \\"
          echo "       --label org.opencontainers.image.revision=${{ github.sha }} \\"
          echo "       --label org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ) \\"
          echo "       -t ${IMAGE}:${TAG} \\"
          echo "       -t ${IMAGE}:latest \\"
          echo "       ."
          sleep 2
          echo ""
          echo "✅ Imagen construida:"
          echo "   • ${IMAGE}:${TAG}"
          echo "   • ${IMAGE}:latest"

      - name: 📤 Docker push a ACR (simulado)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          echo ""
          echo "📤 Publicando imagen en ACR..."
          echo "  → docker push ${IMAGE}:${TAG}"
          sleep 1
          echo "     Pushed: sha256:a1b2c3d4e5f6..."
          echo "  → docker push ${IMAGE}:latest"
          sleep 1
          echo "     Pushed: sha256:a1b2c3d4e5f6..."
          echo ""
          echo "✅ Imagen publicada exitosamente"

      - name: 📋 Resumen del build
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          echo "## 🐳 Imagen publicada en ACR" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Registry** | \`${{ env.ACR_NAME }}.azurecr.io\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${IMAGE}:${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Publicado por** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ℹ️ Para desplegar esta imagen, ejecutá el workflow manualmente con el tag \`${TAG}\`" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3a · Descubrir entornos disponibles
  #   Corre en: workflow_dispatch — lista los environments del repo vía API
  # ───────────────────────────────────────────────────────────────────────────
  discover-environments:
    name: 🔍 Descubrir entornos del repo
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    outputs:
      list: ${{ steps.list.outputs.environments }}

    steps:
      - name: 📡 Consultar GitHub API — Environments
        id: list
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo ""
          echo "📡 Consultando environments configurados en el repositorio..."
          echo "   Repo: ${{ github.repository }}"
          echo ""

          # Obtiene la lista de environments via GitHub API
          ENVS=$(gh api \
            "repos/${{ github.repository }}/environments" \
            --jq '[.environments[] | {name: .name, protection_rules: (.protection_rules | length)}]' \
            2>/dev/null || echo "[]")

          COUNT=$(echo "${ENVS}" | jq 'length')

          if [ "${COUNT}" -eq 0 ]; then
            echo "⚠️  No se encontraron environments configurados en el repositorio."
            echo "   Creá environments en: Settings → Environments"
          else
            echo "📋 Environments encontrados (${COUNT}):"
            echo "${ENVS}" | jq -r '.[] | "   → \(.name)\(if .protection_rules > 0 then " 🔒 (requiere aprobación)" else "" end)"'
          fi

          echo ""
          NAMES=$(echo "${ENVS}" | jq -c '[.[].name]')
          echo "environments=${NAMES}" >> "$GITHUB_OUTPUT"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 3b · Deploy manual
  #   Corre en: workflow_dispatch
  #   • Requiere aprobación si el environment tiene protection rules en GitHub
  #   • El input `environment` muestra automáticamente los envs del repo
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy [${{ inputs.environment }}] · ${{ inputs.tag }}
    if: github.event_name == 'workflow_dispatch'
    needs: discover-environments
    runs-on: ubuntu-latest

    # Aplica las protection rules del environment elegido (approvals, wait timers, etc.)
    environment: ${{ inputs.environment }}

    steps:
      - name: 🔍 Validar entorno seleccionado
        env:
          AVAILABLE: ${{ needs.discover-environments.outputs.list }}
          TARGET: ${{ inputs.environment }}
        run: |
          echo ""
          echo "🎯 Entorno seleccionado : ${TARGET}"
          echo "📋 Entornos disponibles : ${AVAILABLE}"
          echo ""

          # Valida que el entorno exista en el repositorio
          FOUND=$(echo "${AVAILABLE}" | jq -e --arg t "${TARGET}" 'index($t) != null' 2>/dev/null || echo "false")

          if [ "${FOUND}" != "true" ]; then
            echo "❌ ERROR: El entorno '${TARGET}' no está configurado en este repositorio."
            echo ""
            echo "   Entornos disponibles:"
            echo "${AVAILABLE}" | jq -r '.[]' | while read env; do echo "   • ${env}"; done
            echo ""
            echo "   → Configurá environments en: Settings → Environments"
            exit 1
          fi

          echo "✅ Entorno '${TARGET}' validado correctamente"

      - name: 📋 Información del despliegue
        run: |
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  🚀 DESPLIEGUE INICIADO"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "  🏷️  Tag       : ${{ inputs.tag }}"
          echo "  🌍 Entorno   : ${{ inputs.environment }}"
          echo "  📦 Imagen    : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          echo "  👤 Actor     : ${{ github.actor }}"
          echo "  🕐 Fecha     : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

      - name: 🔐 Autenticación Azure (simulado)
        run: |
          echo "🔐 Autenticando con Azure..."
          echo "  → az login --service-principal --tenant <TENANT_ID>"
          sleep 1
          echo "  ✅ Autenticado en Azure"
          echo ""
          echo "🔐 Login en ACR..."
          echo "  → az acr login --name ${{ env.ACR_NAME }}"
          sleep 1
          echo "  ✅ Sesión iniciada en ACR"

      - name: 📥 Pull imagen desde ACR (simulado)
        run: |
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ inputs.tag }}"
          echo ""
          echo "📥 Descargando imagen..."
          echo "  → docker pull ${IMAGE}"
          sleep 1
          echo "  ✅ Imagen lista: ${IMAGE}"

      - name: 🚀 Desplegar en ${{ inputs.environment }} (simulado)
        run: |
          ENV="${{ inputs.environment }}"
          TAG="${{ inputs.tag }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo ""
          echo "🚀 Desplegando en '${ENV}'..."
          echo ""
          echo "  → az containerapp update \\"
          echo "       --name ${{ env.IMAGE_NAME }} \\"
          echo "       --resource-group rg-${ENV} \\"
          echo "       --image ${IMAGE} \\"
          echo "       --set-env-vars ENVIRONMENT=${ENV}"
          sleep 2
          echo ""
          echo "  ✅ Container App actualizado"
          echo ""
          echo "  → Esperando que las réplicas estén listas..."
          sleep 2
          echo "  ✅ Réplicas activas (2/2)"

      - name: 🏥 Health check (simulado)
        run: |
          ENV="${{ inputs.environment }}"
          URL="https://${{ env.IMAGE_NAME }}-${ENV}.azurecontainerapps.io"
          echo ""
          echo "🏥 Verificando salud de la aplicación..."
          echo "  → GET ${URL}/health"
          sleep 1
          echo "  ← HTTP 200 OK"
          echo "       { \"status\": \"healthy\", \"environment\": \"${ENV}\", \"version\": \"${{ inputs.tag }}\" }"
          echo ""
          echo "✅ Aplicación saludable en ${URL}"

      - name: 📋 Resumen del despliegue
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"
          [ "${STATUS}" != "success" ] && ICON="❌"

          echo "## ${ICON} Despliegue — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Entorno** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ inputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Estado** | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Desplegado por** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Fecha** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY

