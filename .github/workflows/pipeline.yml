name: 🔨 CI

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGERS
#   • push / PR           → CI directo sobre este repo (default: go)
#   • workflow_call       → llamado desde repos consumidores
#
# INPUTS (workflow_call)
#   language: "go" | "node" | "dotnet"   (default: "go")
#
# ROUTING
#   Según el language, delega al workflow específico:
#     go     → ci-go.yml     (build + test real con go toolchain)
#     node   → ci-node.yml   (npm ci + npm test)
#     dotnet → ci-dotnet.yml (dotnet build + dotnet test)
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:
  workflow_call:
    inputs:
      language:
        description: "Language stack: go | node | dotnet"
        required: false
        type: string
        default: "go"

concurrency:
  group: ci-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

# ─────────────────────────────────────────────────────────────────────────────
# JOBS — cada uno se activa solo si el language coincide
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  ci-go:
    name: 🐹 Go
    if: ${{ inputs.language == 'go' || inputs.language == '' || inputs.language == null }}
    uses: arielsrv/flow/.github/workflows/ci-go.yml@main

  ci-node:
    name: 🟢 Node
    if: ${{ inputs.language == 'node' }}
    uses: arielsrv/flow/.github/workflows/ci-node.yml@main

  ci-dotnet:
    name: 🔵 .NET
    if: ${{ inputs.language == 'dotnet' }}
    uses: arielsrv/flow/.github/workflows/ci-dotnet.yml@main
