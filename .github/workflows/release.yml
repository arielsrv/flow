name: 🚀 Release

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER
#   • workflow_dispatch from any branch
#   • "Use workflow from" → select a branch (e.g. main)
#   • Enter the tag name in the input (e.g. v1.2.3, v2.0.0-beta)
#
# FLOW
#   1. Build artifact
#   2. Push image to ACR  ← uses the tag name from the input
#   3. Only if all of the above succeeded → create and push the git tag
#
# The tag is the OUTPUT of a successful release, never the input.
# If anything fails, no tag is created and nothing is left behind.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag name (e.g. v1.0, v1.2.3, v2.0.0-beta)"
        required: true
        type: string

env:
  ACR_NAME: myregistry
  IMAGE_NAME: my-app

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 · Build & Push → ACR
  # ───────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: 🐳 Build & Push → ACR
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag:   ${{ steps.meta.outputs.tag }}

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔖 Resolve image metadata
        id: meta
        run: |
          TAG="${{ inputs.tag }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}"
          echo "tag=${TAG}"     >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo ""
          echo "🏷️  Tag          : ${TAG}"
          echo "🌿 Branch        : ${{ github.ref_name }}"
          echo "🔑 Commit        : ${{ github.sha }}"
          echo "🖼️  Target image  : ${IMAGE}:${TAG}"

      - name: 📦 Production build (simulated)
        run: |
          echo ""
          echo "🔨 Production build..."
          echo "  → [1/4] Resolving dependencies .............. ✅"
          sleep 1
          echo "  → [2/4] Compiling in RELEASE mode ........... ✅"
          sleep 1
          echo "  → [3/4] Running pre-package tests ........... ✅"
          sleep 1
          echo "  → [4/4] Generating final artifact ........... ✅"
          echo ""
          echo "✅ Production build ready"

      - name: 🔐 ACR login (simulated)
        run: |
          echo ""
          echo "🔐 Authenticating to Azure Container Registry..."
          echo "  → az acr login --name ${{ env.ACR_NAME }}"
          echo "✅ Logged in to ${{ env.ACR_NAME }}.azurecr.io"

      - name: 🐳 Docker build (simulated)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          echo ""
          echo "🐳 Building Docker image..."
          echo "  → docker build \\"
          echo "       --platform linux/amd64 \\"
          echo "       --label org.opencontainers.image.revision=${{ github.sha }} \\"
          echo "       --label org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ) \\"
          echo "       -t ${IMAGE}:${TAG} \\"
          echo "       -t ${IMAGE}:latest \\"
          echo "       ."
          sleep 2
          echo ""
          echo "✅ Image built:"
          echo "   • ${IMAGE}:${TAG}"
          echo "   • ${IMAGE}:latest"

      - name: 📤 Docker push to ACR (simulated)
        run: |
          IMAGE="${{ steps.meta.outputs.image }}"
          TAG="${{ steps.meta.outputs.tag }}"
          echo ""
          echo "📤 Pushing image to ACR..."
          echo "  → docker push ${IMAGE}:${TAG}"
          sleep 1
          echo "     Pushed: sha256:a1b2c3d4e5f6..."
          echo "  → docker push ${IMAGE}:latest"
          sleep 1
          echo "     Pushed: sha256:a1b2c3d4e5f6..."
          echo ""
          echo "✅ Image published successfully"

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 · Create git tag — only runs if build-and-push succeeded
  # ───────────────────────────────────────────────────────────────────────────
  create-tag:
    name: 🏷️ Create tag — ${{ inputs.tag }}
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write   # required to push tags

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🏷️ Create and push tag
        run: |
          TAG="${{ inputs.tag }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${TAG}" -m "Release ${TAG}"
          git push origin "${TAG}"
          echo ""
          echo "✅ Tag '${TAG}' created → $(git rev-parse HEAD)"

      - name: 📋 Release summary
        run: |
          IMAGE="${{ needs.build-and-push.outputs.image }}"
          TAG="${{ needs.build-and-push.outputs.tag }}"
          echo "## 🚀 Release \`${TAG}\` published" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${IMAGE}:${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Published by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> ✅ Image ready. To deploy, run the **Deploy Manual** workflow and select tag \`${TAG}\`." >> $GITHUB_STEP_SUMMARY
