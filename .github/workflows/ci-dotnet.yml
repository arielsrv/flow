name: 🔵 CI — .NET

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow — llamado desde pipeline.yml cuando language = "dotnet"
#
# Requiere en el repo consumidor:
#   • global.json  (define la versión de .NET SDK)
#   • *.sln o *.csproj en la raíz
#
# Pasos:
#   1. Checkout del repo consumidor
#   2. Setup .NET (versión leída del global.json)
#   3. dotnet restore
#   4. dotnet build
#   5. dotnet test
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:

jobs:
  ci:
    name: 🔨 Build & Test — .NET
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🔵 Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version-file: global.json

      - name: 🔍 Context info
        run: |
          echo "──────────────────────────────────────────"
          echo "🔵 .NET version : $(dotnet --version)"
          echo "👤 Actor        : ${{ github.actor }}"
          echo "🔑 Commit       : ${{ github.sha }}"
          echo "──────────────────────────────────────────"

      - name: 📦 Restore
        run: dotnet restore

      - name: 🔨 Build
        run: dotnet build --no-restore --configuration Release

      - name: 🧪 Test
        run: dotnet test --no-build --configuration Release --verbosity normal

      - name: 📋 CI Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"; [ "${STATUS}" != "success" ] && ICON="❌"
          echo "## ${ICON} CI — .NET" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Restore | \`dotnet restore\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | \`dotnet build --configuration Release\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | \`dotnet test --configuration Release\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${{ github.sha }}\` · **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

