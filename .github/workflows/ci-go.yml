name: 🐹 CI — Go

# ─────────────────────────────────────────────────────────────────────────────
# Reusable workflow — llamado desde pipeline.yml cuando language = "go"
#
# Requiere en el repo consumidor:
#   • go.mod  en la raíz del repo  (define la versión de Go)
#
# Pasos reales (no simulados):
#   1. Checkout del repo consumidor
#   2. Setup Go (versión leída del go.mod)
#   3. go build ./...
#   4. go test -v -cover ./...
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_call:

jobs:
  ci:
    name: 🔨 Build & Test — Go
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐹 Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: 🔍 Context info
        run: |
          echo "──────────────────────────────────────────"
          echo "🐹 Go version : $(go version)"
          echo "📦 Module     : $(go list -m)"
          echo "👤 Actor      : ${{ github.actor }}"
          echo "🔑 Commit     : ${{ github.sha }}"
          echo "──────────────────────────────────────────"

      - name: 📦 Build
        run: go build ./...

      - name: 🧪 Test
        run: go test -v -cover ./...

      - name: 📋 CI Summary
        if: always()
        run: |
          STATUS="${{ job.status }}"
          ICON="✅"; [ "${STATUS}" != "success" ] && ICON="❌"
          echo "## ${ICON} CI — Go" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Step | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔨 Build | \`go build ./...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 🧪 Tests | \`go test -v -cover ./...\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 📊 Status | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> **Commit:** \`${{ github.sha }}\` · **Actor:** @${{ github.actor }}" >> $GITHUB_STEP_SUMMARY

