name: 🔧 Deploy

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER
#   • workflow_dispatch → select only the target environment
#
# HOW TO USE:
#   1. Actions → Deploy Manual → Run workflow
#   2. "Use workflow from" → pick the TAG you want to deploy  ← tag goes here
#   3. Select the target environment
#   4. Run workflow
#
# The tag is read from "Use workflow from" (github.ref_name),
# no additional input needed.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "🌍 Target environment"
        required: true
        type: environment

env:
  ACR_NAME: myregistry
  IMAGE_NAME: my-app

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 · Validate that the workflow was triggered from a tag
  # ───────────────────────────────────────────────────────────────────────────
  validate-tag:
    name: 🔖 Validate tag — ${{ github.ref_name }}
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: ✅ Verify ref is a valid tag
        id: check
        run: |
          REF="${{ github.ref }}"
          TAG="${{ github.ref_name }}"

          echo ""
          echo "📌 Ref         : ${REF}"
          echo "🏷️  Tag         : ${TAG}"
          echo "🌍 Environment : ${{ inputs.environment }}"
          echo ""

          # Ensure the workflow was triggered from a tag, not a branch
          if [[ "${REF}" != refs/tags/* ]]; then
            echo "❌ ERROR: This workflow must be run from a TAG, not a branch."
            echo ""
            echo "   Correct steps:"
            echo "   1. Actions → Deploy Manual → Run workflow"
            echo "   2. 'Use workflow from' → Tag → select the tag (e.g. v1.2.3)"
            echo "   3. Select the environment and click Run"
            echo ""
            echo "   Current ref: ${REF} (this is a branch, not a tag)"
            exit 1
          fi

          echo "✅ Tag validated : ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 📋 Summary
        run: |
          echo "## 🔖 Deploy from tag \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 · Deploy
  #   Applies the protection rules of the selected environment (approvals…)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy [${{ inputs.environment }}] · ${{ needs.validate-tag.outputs.tag }}
    needs: validate-tag
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: 📋 Deployment info
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  🚀 DEPLOYMENT"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "  🏷️  Tag         : ${TAG}"
          echo "  🌍 Environment  : ${ENV}"
          echo "  📦 Image        : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo "  👤 Actor        : ${{ github.actor }}"
          echo "  🕐 Date         : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

      - name: 🔐 Azure authentication (simulated)
        run: |
          echo "🔐 Authenticating to Azure..."
          echo "  → az login --service-principal --tenant <TENANT_ID>"
          sleep 1
          echo "  ✅ Authenticated to Azure"
          echo ""
          echo "🔐 ACR login..."
          echo "  → az acr login --name ${{ env.ACR_NAME }}"
          sleep 1
          echo "  ✅ Logged in to ACR"

      - name: 📥 Pull image from ACR (simulated)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo ""
          echo "📥 Pulling image..."
          echo "  → docker pull ${IMAGE}"
          sleep 1
          echo "  ✅ Image ready: ${IMAGE}"

      - name: 🚀 Deploy (simulated)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo ""
          echo "🚀 Deploying to '${ENV}'..."
          echo ""
          echo "  → az containerapp update \\"
          echo "       --name ${{ env.IMAGE_NAME }} \\"
          echo "       --resource-group rg-${ENV} \\"
          echo "       --image ${IMAGE} \\"
          echo "       --set-env-vars ENVIRONMENT=${ENV}"
          sleep 2
          echo ""
          echo "  ✅ Container App updated"
          echo "  → Waiting for replicas to be ready..."
          sleep 2
          echo "  ✅ Replicas active (2/2)"

      - name: 🏥 Health check (simulated)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          URL="https://${{ env.IMAGE_NAME }}-${ENV}.azurecontainerapps.io"
          echo ""
          echo "🏥 Checking application health..."
          echo "  → GET ${URL}/health"
          sleep 1
          echo "  ← HTTP 200 OK"
          echo "       { \"status\": \"healthy\", \"environment\": \"${ENV}\", \"version\": \"${TAG}\" }"
          echo ""
          echo "✅ Application healthy at ${URL}"

      - name: 📋 Deployment summary
        if: always()
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          STATUS="${{ job.status }}"
          ICON="✅"; [ "${STATUS}" != "success" ] && ICON="❌"

          echo "## ${ICON} Deploy — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Date** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
