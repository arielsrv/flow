name: 🔧 Deploy Manual

# ─────────────────────────────────────────────────────────────────────────────
# TRIGGER
#   • workflow_dispatch
#
# CÓMO USARLO:
#   1. Actions → Deploy Manual → Run workflow
#   2. "Use workflow from" → elegí el TAG que querés desplegar  ← aquí va el tag
#   3. Seleccioná el entorno destino
#   4. Run workflow
#
# El tag se toma de "Use workflow from" (github.ref_name), no hace falta
# ningún input adicional.
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "🌍 Entorno de despliegue"
        required: true
        type: environment

env:
  ACR_NAME: myregistry
  IMAGE_NAME: my-app

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 · Validar que se disparó desde un tag
  # ───────────────────────────────────────────────────────────────────────────
  validate-tag:
    name: 🔖 Validar tag — ${{ github.ref_name }}
    runs-on: ubuntu-latest

    outputs:
      tag: ${{ steps.check.outputs.tag }}

    steps:
      - name: ✅ Verificar que el ref es un tag válido
        id: check
        run: |
          REF="${{ github.ref }}"
          TAG="${{ github.ref_name }}"

          echo ""
          echo "📌 Ref    : ${REF}"
          echo "🏷️  Tag    : ${TAG}"
          echo "🌍 Entorno: ${{ inputs.environment }}"
          echo ""

          # Verificar que se lanzó desde un tag (refs/tags/...) y no desde una rama
          if [[ "${REF}" != refs/tags/* ]]; then
            echo "❌ ERROR: Este workflow debe ejecutarse desde un TAG."
            echo ""
            echo "   Pasos correctos:"
            echo "   1. Actions → Deploy Manual → Run workflow"
            echo "   2. 'Use workflow from' → Tag → seleccioná el tag (ej: v1.2.3)"
            echo "   3. Elegí el entorno y dale Run"
            echo ""
            echo "   Ref actual: ${REF} (es una rama, no un tag)"
            exit 1
          fi

          echo "✅ Tag validado : ${TAG}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: 📋 Resumen
        run: |
          echo "## 🔖 Deploy desde tag \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Entorno** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Disparado por** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 · Deploy
  #   Aplica las protection rules del environment elegido (approvals, timers…)
  # ───────────────────────────────────────────────────────────────────────────
  deploy:
    name: 🚀 Deploy [${{ inputs.environment }}] · ${{ needs.validate-tag.outputs.tag }}
    needs: validate-tag
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: 📋 Información del despliegue
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          echo ""
          echo "══════════════════════════════════════════════"
          echo "  🚀 DESPLIEGUE"
          echo "══════════════════════════════════════════════"
          echo ""
          echo "  🏷️  Tag       : ${TAG}"
          echo "  🌍 Entorno   : ${ENV}"
          echo "  📦 Imagen    : ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo "  👤 Actor     : ${{ github.actor }}"
          echo "  🕐 Fecha     : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo ""

      - name: 🔐 Autenticación Azure (simulado)
        run: |
          echo "🔐 Autenticando con Azure..."
          echo "  → az login --service-principal --tenant <TENANT_ID>"
          sleep 1
          echo "  ✅ Autenticado en Azure"
          echo ""
          echo "🔐 Login en ACR..."
          echo "  → az acr login --name ${{ env.ACR_NAME }}"
          sleep 1
          echo "  ✅ Sesión iniciada en ACR"

      - name: 📥 Pull imagen desde ACR (simulado)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo ""
          echo "📥 Descargando imagen..."
          echo "  → docker pull ${IMAGE}"
          sleep 1
          echo "  ✅ Imagen lista: ${IMAGE}"

      - name: 🚀 Desplegar (simulado)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          IMAGE="${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}"
          echo ""
          echo "🚀 Desplegando en '${ENV}'..."
          echo ""
          echo "  → az containerapp update \\"
          echo "       --name ${{ env.IMAGE_NAME }} \\"
          echo "       --resource-group rg-${ENV} \\"
          echo "       --image ${IMAGE} \\"
          echo "       --set-env-vars ENVIRONMENT=${ENV}"
          sleep 2
          echo ""
          echo "  ✅ Container App actualizado"
          echo "  → Esperando que las réplicas estén listas..."
          sleep 2
          echo "  ✅ Réplicas activas (2/2)"

      - name: 🏥 Health check (simulado)
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          ENV="${{ inputs.environment }}"
          URL="https://${{ env.IMAGE_NAME }}-${ENV}.azurecontainerapps.io"
          echo ""
          echo "🏥 Verificando salud de la aplicación..."
          echo "  → GET ${URL}/health"
          sleep 1
          echo "  ← HTTP 200 OK"
          echo "       { \"status\": \"healthy\", \"environment\": \"${ENV}\", \"version\": \"${TAG}\" }"
          echo ""
          echo "✅ Aplicación saludable en ${URL}"

      - name: 📋 Resumen del despliegue
        if: always()
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          STATUS="${{ job.status }}"
          ICON="✅"; [ "${STATUS}" != "success" ] && ICON="❌"

          echo "## ${ICON} Deploy — ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Campo | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Tag** | \`${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Entorno** | \`${{ inputs.environment }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Imagen** | \`${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${TAG}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Estado** | ${STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Desplegado por** | @${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Fecha** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
