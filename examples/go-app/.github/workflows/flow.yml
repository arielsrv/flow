name: Flow
on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      action:
        description: "Action to perform"
        required: true
        type: choice
        options: [release, deploy]
      tag:
        description: "Tag name (e.g. v1.2.3) — required for release and deploy"
        required: false
      environment:
        description: "Target environment — required for deploy"
        required: false
        type: choice
        options: [development, staging, production]

# ─────────────────────────────────────────────────────────────────────────────
# Único archivo que necesita el repo consumidor.
# Cambiá "language" según tu stack:  go | node | dotnet
# El resto lo maneja arielpineiro/flow automáticamente.
# ─────────────────────────────────────────────────────────────────────────────
jobs:

  ci:
    if: github.event_name != 'workflow_dispatch'
    uses: arielpineiro/flow/.github/workflows/pipeline.yml@main
    with:
      language: "go"   # ← única línea que el dev configura

  release:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'release'
    uses: arielpineiro/flow/.github/workflows/release.yml@main
    with:
      tag: ${{ inputs.tag }}
    secrets: inherit

  deploy:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'deploy'
    uses: arielpineiro/flow/.github/workflows/deploy.yml@main
    with:
      tag: ${{ inputs.tag }}
      environment: ${{ inputs.environment }}
    secrets: inherit

